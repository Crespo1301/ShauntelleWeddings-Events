<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shasta | Shauntelle Weddings &amp; Events</title>
    <meta name="description" content="Browse the Shasta photo album from Shauntelle Weddings &amp; Events." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"

    />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body data-page="gallery">
    <div class="site-shell">
      <div data-include="../../partials/header.html"></div>

      <main>
        <section class="page-hero page-hero-light">
          <div class="container hero-wide">
            <p class="eyebrow">Photo Album</p>
            <h1>Shasta</h1>
            <p class="lead">
              A dedicated event album styled to match the main gallery experience.
            </p>
            <div class="button-row">
              <a class="btn btn-secondary" href="../../gallery.html">Back to Main Gallery</a>
            </div>
          </div>
        </section>

        <section class="section gallery-page-section">

            <div class="gallery-rail-window">
              <div class="gallery-rail-grid" data-gallery>
                <!--
                  ALBUM IMAGE SYSTEM
                  Duplicate one button block for each new image.
                  Update:
                  - data-full
                  - img src
                  - alt text
                  - aria-label
                -->
                <button class="gallery-thumb is-active" type="button" data-gallery-thumb data-full="../../assets/gallery/Shasta/shasta_1.JPG" aria-label="Open Shasta photo 1">
                  <img src="../../assets/gallery/Shasta/shasta_1.JPG" alt="Shasta photo 1" loading="lazy" decoding="async" />
                </button>
                <button class="gallery-thumb" type="button" data-gallery-thumb data-full="../../assets/gallery/Shasta/shasta_2.JPG" aria-label="Open Shasta photo 2">

            <button class="carousel-button gallery-rail-button next" type="button" aria-label="Next gallery images" data-gallery-rail-next>&rarr;</button>
          </div>
        </section>

        <div class="lightbox" data-lightbox hidden>
          <button class="lightbox-close" type="button" aria-label="Close gallery" data-lightbox-close>&times;</button>
          <button class="lightbox-nav prev" type="button" aria-label="Previous image" data-lightbox-prev>&larr;</button>
          <div class="lightbox-image-wrap">
            <img src="../../assets/gallery/Shasta/shasta_1.JPG" alt="Album gallery image" data-lightbox-image />
          </div>
          <button class="lightbox-nav next" type="button" aria-label="Next image" data-lightbox-next>&rarr;</button>
